<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Sample Notion Page</title></head>
<body>
<article>
  <h1>Sample Notion Page</h1>
  <p>Some intro text that should be ignored.</p>

  <details>
    <summary>What is Python?</summary>
    <p>A high-level programming language.</p>
    <figure><img src="Sample%20Notion%20Page%20abc123/python-logo.png" alt="Python logo"></figure>
  </details>

  <p>Another non-toggle block — also ignored.</p>

  <details>
    <summary>Outer toggle</summary>
    <p>Outer back text.</p>
    <details>
      <summary>Inner toggle</summary>
      <p>Inner back text.</p>
    </details>
    <p>After-inner outer text.</p>
  </details>
</article>
</body>
</html>
